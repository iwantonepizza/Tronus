// --- Computed Stats ---
function computePlayerStats(playerId) {
  const player = PLAYERS.find(p => p.id === playerId);
  const completed = SESSIONS.filter(s => s.status === 'completed');
  const myGames = completed.filter(s => s.participations.some(p => p.user.id === playerId));
  const myParticipations = myGames.map(s => s.participations.find(p => p.user.id === playerId));
  const wins = myParticipations.filter(p => p.isWinner).length;
  const totalGames = myGames.length;
  const winrate = totalGames > 0 ? wins / totalGames : 0;
  const avgPlace = totalGames > 0 ? myParticipations.reduce((a, p) => a + (p.place || 0), 0) / totalGames : 0;
  const avgCastles = totalGames > 0 ? myParticipations.reduce((a, p) => a + (p.castles || 0), 0) / totalGames : 0;

  // faction breakdown
  const factionMap = {};
  myParticipations.forEach(p => {
    if (!factionMap[p.faction]) factionMap[p.faction] = { games: 0, wins: 0 };
    factionMap[p.faction].games++;
    if (p.isWinner) factionMap[p.faction].wins++;
  });
  const factionEntries = Object.entries(factionMap).map(([slug, d]) => ({ slug, ...d, winrate: d.games > 0 ? d.wins / d.games : 0 }));
  const favoriteFaction = factionEntries.sort((a,b) => b.games - a.games)[0]?.slug || player.favoriteFaction;
  const bestFaction = [...factionEntries].sort((a,b) => b.winrate - a.winrate)[0];
  const worstFaction = [...factionEntries].sort((a,b) => a.winrate - b.winrate)[0];

  // streak
  const last10games = myGames.slice(-10);
  let streakType = null, streakCount = 0;
  for (let i = last10games.length - 1; i >= 0; i--) {
    const p = last10games[i].participations.find(x => x.user.id === playerId);
    const isWin = p.isWinner;
    if (streakType === null) { streakType = isWin ? 'win' : 'loss'; streakCount = 1; }
    else if ((streakType === 'win') === isWin) streakCount++;
    else break;
  }

  // votes received
  const allVotes = SESSIONS.flatMap(s => s.votes);
  const crownsReceived = allVotes.filter(v => v.toUser.id === playerId && v.voteType === 'positive').length;
  const shitsReceived = allVotes.filter(v => v.toUser.id === playerId && v.voteType === 'negative').length;

  const last10 = myGames.slice(-10).map(s => {
    const participation = s.participations.find(x => x.user.id === playerId);
    return { matchId: s.id, place: participation.place, faction: participation.faction };
  });

  return {
    user: player, totalGames, wins, winrate,
    avgPlace: Math.round(avgPlace * 10) / 10,
    avgCastles: Math.round(avgCastles * 10) / 10,
    favoriteFaction,
    bestFaction: bestFaction ? { faction: bestFaction.slug, winrate: bestFaction.winrate } : null,
    worstFaction: worstFaction ? { faction: worstFaction.slug, winrate: worstFaction.winrate } : null,
    currentStreak: { type: streakType || 'win', count: streakCount },
    last10, crownsReceived, shitsReceived, factionBreakdown: factionEntries,
  };
}

function computeFactionStats(slug) {
  const faction = FACTIONS[slug];
  const completed = SESSIONS.filter(s => s.status === 'completed');
  const gamesWithFaction = completed.filter(s => s.participations.some(p => p.faction === slug));
  const totalGames = gamesWithFaction.length;
  const wins = gamesWithFaction.filter(s => s.participations.find(p => p.faction === slug)?.isWinner).length;
  const winrate = totalGames > 0 ? wins / totalGames : 0;
  const participations = gamesWithFaction.map(s => s.participations.find(p => p.faction === slug));
  const avgPlace = totalGames > 0 ? participations.reduce((a, p) => a + (p.place || 0), 0) / totalGames : 0;
  const avgCastles = totalGames > 0 ? participations.reduce((a, p) => a + (p.castles || 0), 0) / totalGames : 0;

  const byMode = Object.values(MODES).map(mode => {
    const modeGames = gamesWithFaction.filter(s => s.mode.slug === mode.slug);
    const modeWins = modeGames.filter(s => s.participations.find(p => p.faction === slug)?.isWinner).length;
    return { mode: mode.slug, games: modeGames.length, winrate: modeGames.length > 0 ? modeWins / modeGames.length : 0 };
  }).filter(x => x.games > 0);

  // top players
  const playerMap = {};
  gamesWithFaction.forEach(s => {
    const part = s.participations.find(p => p.faction === slug);
    const uid = part.user.id;
    if (!playerMap[uid]) playerMap[uid] = { user: part.user, games: 0, wins: 0 };
    playerMap[uid].games++;
    if (part.isWinner) playerMap[uid].wins++;
  });
  const topPlayers = Object.values(playerMap)
    .map(x => ({ ...x, winrate: x.games > 0 ? x.wins / x.games : 0 }))
    .sort((a, b) => b.winrate - a.winrate).slice(0, 5);

  return { faction, totalGames, wins, winrate, avgPlace: Math.round(avgPlace*10)/10, avgCastles: Math.round(avgCastles*10)/10, byMode, topPlayers };
}

function computeOverview() {
  const completed = SESSIONS.filter(s => s.status === 'completed');
  const nextMatch = SESSIONS.find(s => s.status === 'planned' && new Date(s.scheduledAt) > new Date()) || null;

  const factionWins = {};
  const factionGames = {};
  completed.forEach(s => {
    s.participations.forEach(p => {
      factionGames[p.faction] = (factionGames[p.faction] || 0) + 1;
      if (p.isWinner) factionWins[p.faction] = (factionWins[p.faction] || 0) + 1;
    });
  });

  const mostPopularSlug = Object.entries(factionGames).sort((a,b) => b[1]-a[1])[0]?.[0];
  const factionWinrates = Object.entries(factionGames).map(([slug, games]) => ({
    faction: FACTIONS[slug], winrate: games > 0 ? (factionWins[slug] || 0) / games : 0,
  })).sort((a,b) => b.winrate - a.winrate);

  const playerWins = {};
  completed.forEach(s => s.participations.filter(p => p.isWinner).forEach(p => {
    playerWins[p.user.id] = (playerWins[p.user.id] || 0) + 1;
  }));
  const topWinnerId = Object.entries(playerWins).sort((a,b) => b[1]-a[1])[0]?.[0];
  const currentLeader = topWinnerId ? { user: PLAYERS.find(p => p.id === parseInt(topWinnerId)), wins: playerWins[topWinnerId] } : null;

  const topWinrate = PLAYERS.map(u => {
    const stats = computePlayerStats(u.id);
    return { user: u, winrate: stats.winrate, games: stats.totalGames };
  }).filter(x => x.games >= 3).sort((a,b) => b.winrate - a.winrate).slice(0, 5);

  return {
    nextMatch,
    recentMatches: SESSIONS.filter(s => s.status === 'completed').slice(-8).reverse(),
    totalMatches: completed.length,
    activePlayers: PLAYERS.length,
    mostPopularFaction: mostPopularSlug ? { faction: FACTIONS[mostPopularSlug], games: factionGames[mostPopularSlug] } : null,
    currentLeader,
    factionWinrates,
    topWinrate,
    funFacts: [
      { icon: '⏱️', title: 'Самая долгая партия', description: '12 раундов, ~4 часа — RedViper за Мартеллов (Партия #8)' },
      { icon: '⚡', title: 'Эпичный камбэк', description: 'RedViper с 4-го на 1-е за 3 раунда в партии #8' },
      { icon: '👑', title: 'Хет-трик', description: 'Bookworm победил 3 раза подряд за Тиреллов (партии #7, #3, #15)' },
    ],
  };
}

function computeLeaderboard(metric) {
  return PLAYERS.map(u => {
    const s = computePlayerStats(u.id);
    let value;
    switch (metric) {
      case 'winrate': value = s.winrate; break;
      case 'wins': value = s.wins; break;
      case 'games': value = s.totalGames; break;
      case 'crowns': value = s.crownsReceived; break;
      case 'shits': value = s.shitsReceived; break;
      case 'avgplace': value = s.avgPlace; break;
      default: value = s.winrate;
    }
    return { user: u, value, stats: s };
  }).filter(x => x.stats.totalGames > 0)
    .sort((a,b) => metric === 'avgplace' ? a.value - b.value : b.value - a.value);
}

function computeH2H(userAId, userBId) {
  const completed = SESSIONS.filter(s => s.status === 'completed');
  const together = completed.filter(s =>
    s.participations.some(p => p.user.id === userAId) &&
    s.participations.some(p => p.user.id === userBId)
  );
  const winsA = together.filter(s => s.participations.find(p => p.user.id === userAId)?.isWinner).length;
  const winsB = together.filter(s => s.participations.find(p => p.user.id === userBId)?.isWinner).length;
  const placesA = together.map(s => s.participations.find(p => p.user.id === userAId)?.place || 0);
  const placesB = together.map(s => s.participations.find(p => p.user.id === userBId)?.place || 0);
  const avgPlaceA = placesA.length > 0 ? placesA.reduce((a,b) => a+b,0)/placesA.length : 0;
  const avgPlaceB = placesB.length > 0 ? placesB.reduce((a,b) => a+b,0)/placesB.length : 0;
  return {
    userA: PLAYERS.find(p => p.id === userAId),
    userB: PLAYERS.find(p => p.id === userBId),
    gamesTogetherCount: together.length,
    winsA, winsB,
    avgPlaceA: Math.round(avgPlaceA*10)/10,
    avgPlaceB: Math.round(avgPlaceB*10)/10,
    matches: together.reverse(),
  };
}

window.GOT = {
  FACTIONS, MODES, DECKS, PLAYERS, SESSIONS,
  computePlayerStats, computeFactionStats, computeOverview,
  computeLeaderboard, computeH2H,
};

})();

</script>

// ── StatTile ─────────────────────────────────────────────────────────────────
function StatTile({ label, value, icon, sub, accent, large }) {
  const [displayed, setDisplayed] = useState(0);
  const ref = useRef(null);
  const numVal = typeof value === 'number' ? value : parseFloat(value);
  const isNum = !isNaN(numVal);

  useEffect(() => {
    if (!isNum) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {
        let start = 0;
        const dur = 600;
        const step = (ts) => {
          if (!start) start = ts;
          const prog = Math.min((ts - start) / dur, 1);
          const ease = 1 - Math.pow(1 - prog, 3);
          setDisplayed(numVal * ease);
          if (prog < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
        obs.disconnect();
      }
    }, { threshold: 0.3 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [numVal]);

  const displayVal = isNum
    ? (numVal % 1 !== 0 ? (displayed).toFixed(1) : Math.round(displayed))
    : value;

  return (
    <div ref={ref} style={{
      background: '#17171F', borderRadius: 12, padding: '20px 24px',
      border: `1px solid #2A2A36`, display: 'flex', flexDirection: 'column', gap: 8,
      transition: 'border-color 0.2s, transform 0.15s, box-shadow 0.15s',

      <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: large ? 48 : 32, fontWeight: 700, color: accent || '#C9A44C', lineHeight: 1 }}>
        {isNum && numVal <= 1 && numVal > 0 && numVal % 1 !== 0
          ? `${Math.round(displayed * 100)}%`
          : displayVal}
      </div>
      <div style={{ color: '#A8A8B3', fontSize: 13, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.08em' }}>{label}</div>
      {sub && <div style={{ color: '#6B6B75', fontSize: 12 }}>{sub}</div>}
    </div>
  );
}

// ── MatchCard ────────────────────────────────────────────────────────────────
function MatchCard({ match, onClick, compact }) {
  const winner = match.participations.find(p => p.isWinner);

  const date = new Date(match.scheduledAt);

  return (
    <div
      onClick={() => onClick && onClick(match.id)}
      style={{
        background: '#17171F', borderRadius: 12, padding: compact ? '12px 16px' : '16px 20px',

        cursor: onClick ? 'pointer' : 'default',

      }}
      onMouseEnter={e => { if(onClick){ e.currentTarget.style.transform='translateY(-2px)'; e.currentTarget.style.boxShadow='0 10px 40px -10px rgba(0,0,0,0.6)'; }}}

        <div style={{ textAlign: 'right' }}>

          <span>👑</span>
          <span>{winner.user.nickname}</span>
          <FactionBadge factionSlug={winner.faction} size="sm" showLabel />
        </div>
      )}
    </div>
  );
}

// ── PlacementRow ─────────────────────────────────────────────────────────────
function PlacementRow({ participation, rank, onClick }) {
  const f = FACTIONS[participation.faction];
  const isFirst = rank === 1;
  return (
    <div
      onClick={() => onClick && onClick(participation.user.id)}

        display: 'flex', alignItems: 'center', gap: 16, padding: '14px 20px',

}

// ── EmptyState ────────────────────────────────────────────────────────────────
function EmptyState({ icon = '🗡️', title, description, cta }) {

    <div style={{ textAlign: 'center', padding: '60px 24px', color: '#6B6B75' }}>

// ── LoadingSkeleton ──────────────────────────────────────────────────────────
function LoadingSkeleton({ variant = 'card', count = 3 }) {
  const shimmer = {
    background: 'linear-gradient(90deg, #17171F 25%, #1F1F2A 50%, #17171F 75%)',
    backgroundSize: '400% 100%',
    animation: 'shimmer 1.5s infinite',
    borderRadius: 8,
  };
  const items = Array.from({ length: count });
  if (variant === 'card') return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
      {items.map((_, i) => (
        <div key={i} style={{ background: '#17171F', borderRadius: 12, padding: 20, border: '1px solid #2A2A36' }}>
          <div style={{ ...shimmer, height: 16, width: '60%', marginBottom: 12 }}/>
          <div style={{ ...shimmer, height: 12, width: '40%' }}/>
        </div>
      ))}
    </div>
  );
  if (variant === 'tile') return (
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(160px, 1fr))', gap: 16 }}>
      {items.map((_, i) => <div key={i} style={{ ...shimmer, height: 100, borderRadius: 12 }}/>)}
    </div>
  );
  return null;
}

// ── LeaderboardRow ───────────────────────────────────────────────────────────
function LeaderboardRow({ rank, user, metricValue, metricLabel, faction, onClick }) {
  const medals = { 1: '🥇', 2: '🥈', 3: '🥉' };
  const bgColors = { 1: '#C9A44C12', 2: '#A8A8B312', 3: '#C9753A12' };
  const f = faction ? FACTIONS[faction] : null;

  const formatValue = (v, label) => {
    if (label === 'Винрейт' || label === 'Win%') return `${Math.round(v * 100)}%`;
    if (typeof v === 'number' && v % 1 !== 0) return v.toFixed(1);
    return v;
  };

  return (
    <div
      onClick={() => onClick && onClick(user.id)}
      style={{
        display: 'flex', alignItems: 'center', gap: 16, padding: '12px 20px',
        borderRadius: 10, cursor: onClick ? 'pointer' : 'default',
        background: bgColors[rank] || 'transparent',
        border: rank <= 3 ? `1px solid ${rank === 1 ? '#C9A44C' : rank === 2 ? '#A8A8B3' : '#C9753A'}33` : '1px solid transparent',
        transition: 'background 0.2s',
        marginBottom: 4,
      }}
      onMouseEnter={e => { e.currentTarget.style.background = '#1F1F2A'; }}
      onMouseLeave={e => { e.currentTarget.style.background = bgColors[rank] || 'transparent'; }}
    >
      <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 20, width: 32, textAlign: 'center' }}>
        {medals[rank] || <span style={{ color: '#6B6B75', fontSize: 14 }}>{rank}</span>}
      </div>
      <AvatarCircle user={user} faction={faction} size={40} />
      <div style={{ flex: 1 }}>
        <div style={{ color: '#F0E6D2', fontWeight: 600 }}>{user.nickname}</div>
        {faction && <FactionBadge factionSlug={faction} size="sm" showLabel />}
      </div>
      <div style={{ textAlign: 'right' }}>
        <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 24, fontWeight: 700, color: rank <= 3 ? '#C9A44C' : '#F0E6D2' }}>
          {formatValue(metricValue, metricLabel)}
        </div>
        <div style={{ color: '#6B6B75', fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.06em' }}>{metricLabel}</div>
      </div>
    </div>
  );
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function Toast({ message, type = 'info', onClose }) {
  const colors = { info: '#4B6FA5', success: '#4F7D4F', error: '#B73E3E', warning: '#D9883E' };
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return (
    <div style={{
      position: 'fixed', bottom: 80, right: 24, zIndex: 9999,
      background: '#1F1F2A', border: `1px solid ${colors[type]}`,
      borderRadius: 10, padding: '12px 20px', color: '#F0E6D2', fontSize: 14,
      boxShadow: '0 10px 40px rgba(0,0,0,0.6)',
      animation: 'slideInRight 0.3s ease-out',
    }}>
      {message}
    </div>
  );
}

// ── NumberStepper ─────────────────────────────────────────────────────────────
function NumberStepper({ value, onChange, min = 0, max = 15, icon = '🏰' }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
      <span style={{ fontSize: 18 }}>{icon}</span>
      <button onClick={() => onChange(Math.max(min, value - 1))} style={{ width: 32, height: 32, borderRadius: 6, background: '#2A2A36', border: '1px solid #3A3A46', color: '#F0E6D2', cursor: 'pointer', fontSize: 18, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>−</button>
      <span style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 20, fontWeight: 700, color: '#F0E6D2', width: 32, textAlign: 'center' }}>{value}</span>
      <button onClick={() => onChange(Math.min(max, value + 1))} style={{ width: 32, height: 32, borderRadius: 6, background: '#2A2A36', border: '1px solid #3A3A46', color: '#F0E6D2', cursor: 'pointer', fontSize: 18, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>+</button>
    </div>
  );
}

// Export
Object.assign(window, {
  AvatarCircle, FactionBadge, PlayerPill, StatTile, WinrateBar,
  MatchCard, PlacementRow, EmptyState, LoadingSkeleton,
  LeaderboardRow, Toast, NumberStepper, SIGILS,
});
})();

</script>

                border: 'none', cursor: 'pointer', textAlign: 'left',
                borderLeft: active ? '3px solid #C9A44C' : '3px solid transparent',

                transition: 'all 0.15s',
                fontSize: 15,
              }}
              onMouseEnter={e => { if (!active) { e.currentTarget.style.background = '#17171F'; e.currentTarget.style.color = '#F0E6D2'; }}}
              onMouseLeave={e => { if (!active) { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = '#A8A8B3'; }}}
            >
              <span style={{ fontSize: 18, width: 24, textAlign: 'center' }}>{item.icon}</span>
              <span style={{ fontWeight: active ? 600 : 400 }}>{item.label}</span>

        })}
      </nav>
      <div style={{ padding: '16px 12px', borderTop: '1px solid #1A1A22' }}>
        <button
          onClick={() => navigate('create')}
          style={{
            width: '100%', background: '#C9A44C', color: '#0E0E12',
            border: 'none', borderRadius: 8, padding: '12px', fontWeight: 700,
            fontSize: 14, cursor: 'pointer', display: 'flex', alignItems: 'center',

function AppShell({ children, currentPage, navigate }) {
  const currentUser = PLAYERS[0]; // IronFist as logged-in user
  const isMobile = window.innerWidth < 640;
  const [mobile, setMobile] = useState(window.innerWidth < 640);
  useEffect(() => {
    const handler = () => setMobile(window.innerWidth < 640);
    window.addEventListener('resize', handler);
    return () => window.removeEventListener('resize', handler);
  }, []);

  return (
    <div style={{ minHeight: '100vh', background: '#0E0E12', color: '#F0E6D2' }}>
      <TopBar currentUser={currentUser} navigate={navigate} />

        {children}
      </main>
      {mobile && <BottomNav currentPage={currentPage} navigate={navigate} />}
    </div>
  );
}

Object.assign(window, { AppShell, Sidebar, TopBar, BottomNav, NAV_ITEMS });

<script type="text/babel">

          }}>

        {ov.currentLeader && (

      <div style={{ ...anim(160), marginBottom: 32 }}>

// ── MATCHES LIST ─────────────────────────────────────────────────────────────
function MatchesScreen({ navigate }) {
  const [statusFilter, setStatusFilter] = useState('all');
  const [modeFilter, setModeFilter] = useState('all');
  const [sort, setSort] = useState('newest');

  const all = [...SESSIONS].filter(s => {
    if (statusFilter !== 'all' && s.status !== statusFilter) return false;
    if (modeFilter !== 'all' && s.mode.slug !== modeFilter) return false;
    return true;
  }).sort((a, b) => {
    if (sort === 'newest') return new Date(b.scheduledAt) - new Date(a.scheduledAt);
    if (sort === 'oldest') return new Date(a.scheduledAt) - new Date(b.scheduledAt);
    if (sort === 'longest') return (b.outcome?.roundsPlayed || 0) - (a.outcome?.roundsPlayed || 0);
    return 0;
  });

  const chipStyle = (active) => ({
    background: active ? '#C9A44C' : '#17171F',
    color: active ? '#0E0E12' : '#A8A8B3',
    border: `1px solid ${active ? '#C9A44C' : '#2A2A36'}`,
    borderRadius: 100, padding: '4px 14px', cursor: 'pointer', fontSize: 13,
    fontWeight: active ? 700 : 400, transition: 'all 0.15s',
  });

  return (
    <div style={{ maxWidth: 1280, margin: '0 auto' }}>
      <h1 style={{ fontFamily: "'Cinzel',serif", fontSize: 28, color: '#F0E6D2', marginBottom: 24 }}>Все партии</h1>

      {/* Filters */}
      <div style={{ background: '#17171F', borderRadius: 12, padding: '20px', border: '1px solid #2A2A36', marginBottom: 24 }}>
        <div style={{ marginBottom: 12 }}>
          <div style={{ color: '#6B6B75', fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 8 }}>Статус</div>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            {[['all', 'Все'], ['completed', 'Сыграны'], ['planned', 'Запланированы'], ['cancelled', 'Отменены']].map(([v, l]) => (
              <button key={v} style={chipStyle(statusFilter === v)} onClick={() => setStatusFilter(v)}>{l}</button>
            ))}
          </div>
        </div>
        <div style={{ marginBottom: 12 }}>
          <div style={{ color: '#6B6B75', fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 8 }}>Режим</div>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            {[['all', 'Все'], ['classic', '⚔️ Классика'], ['quests', '📜 Квесты'], ['alternative', '🔀 Альтернатива'], ['dragons', '🐉 Драконы']].map(([v, l]) => (
              <button key={v} style={chipStyle(modeFilter === v)} onClick={() => setModeFilter(v)}>{l}</button>
            ))}
          </div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ color: '#6B6B75', fontSize: 12 }}>Сортировка:</span>
          {[['newest', 'Новые'], ['oldest', 'Старые'], ['longest', 'По раундам']].map(([v, l]) => (
            <button key={v} style={chipStyle(sort === v)} onClick={() => setSort(v)}>{l}</button>
          ))}
        </div>
      </div>

      {all.length === 0 ? (
        <EmptyState icon="⚔️" title="Партий не найдено" description="Попробуйте изменить фильтры" />
      ) : (
        <div>
          <div style={{ color: '#6B6B75', fontSize: 13, marginBottom: 16 }}>{all.length} партий</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))', gap: 16 }}>
            {all.map(m => (
              <MatchCard key={m.id} match={m} onClick={(id) => navigate('match', { id })} />
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── MATCH DETAIL ─────────────────────────────────────────────────────────────
function MatchDetailScreen({ matchId, navigate }) {
  const match = SESSIONS.find(s => s.id === matchId) || SESSIONS[0];
  const [votes, setVotes] = useState(match.votes || []);
  const [comments, setComments] = useState(match.comments || []);
  const [newComment, setNewComment] = useState('');
  const [voteEffect, setVoteEffect] = useState(null);
  const currentUser = window.GOT.PLAYERS[0];

  const date = new Date(match.scheduledAt);
  const dateStr = date.toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  const timeStr = date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });

  const statusLabels = { completed: 'Завершена', planned: 'Запланирована', cancelled: 'Отменена' };
  const statusColors = { completed: '#4F7D4F', planned: '#C9A44C', cancelled: '#6B6B75' };
  const endReasonLabels = { castles_7: '7 замков', timer: 'Таймер', rounds_end: 'Конец раундов', early: 'Досрочно', other: 'Другое' };
  const modeEmoji = { classic: '⚔️', quests: '📜', alternative: '🔀', dragons: '🐉' };

  const sortedParticipations = [...match.participations].sort((a, b) => (a.place || 99) - (b.place || 99));

  function handleVote(toUserId, type) {
    const existing = votes.find(v => v.fromUser.id === currentUser.id && v.toUser.id === toUserId);
    if (existing) {
      if (existing.voteType === type) { setVotes(votes.filter(v => v.id !== existing.id)); return; }
      setVotes(votes.map(v => v.id === existing.id ? { ...v, voteType: type } : v));
    } else {
      const toUser = PLAYERS.find(p => p.id === toUserId);
      setVotes([...votes, { id: Date.now(), fromUser: currentUser, toUser, voteType: type, createdAt: new Date().toISOString() }]);
    }
    setVoteEffect({ userId: toUserId, type });
    setTimeout(() => setVoteEffect(null), 800);
  }

  function handleComment(e) {
    e.preventDefault();
    if (!newComment.trim()) return;
    setComments([...comments, { id: Date.now(), author: currentUser, body: newComment, createdAt: new Date().toISOString(), editedAt: null }]);
    setNewComment('');
  }

  const voteSummary = (userId) => ({
    crowns: votes.filter(v => v.toUser.id === userId && v.voteType === 'positive').length,
    shits: votes.filter(v => v.toUser.id === userId && v.voteType === 'negative').length,
    myVote: votes.find(v => v.fromUser.id === currentUser.id && v.toUser.id === userId)?.voteType || null,
  });

  function relTime(iso) {
    const diff = Date.now() - new Date(iso).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'только что';
    if (mins < 60) return `${mins} мин назад`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}ч назад`;
    return `${Math.floor(hrs / 24)}д назад`;
  }

    <div style={{ maxWidth: 1000, margin: '0 auto' }}>
      {/* Back */}
      <button onClick={() => navigate('matches')} style={{ background: 'none', border: 'none', color: '#C9A44C', cursor: 'pointer', fontSize: 13, marginBottom: 16, padding: 0 }}>← Все партии</button>

      {/* Hero */}

        background: 'linear-gradient(135deg, #17171F 0%, #1F1F2A 100%)',
        borderRadius: 16, padding: '28px 32px', marginBottom: 24,
        border: '1px solid #2A2A36',
        animation: 'scaleIn 0.2s ease-out',
      }}>
        <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 16, flexWrap: 'wrap' }}>
          <div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
              <span style={{ fontFamily: "'JetBrains Mono',monospace", color: '#6B6B75', fontSize: 13 }}>Партия #{match.id}</span>
              <span style={{ background: statusColors[match.status] + '22', color: statusColors[match.status], fontSize: 11, padding: '2px 10px', borderRadius: 100, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.06em' }}>{statusLabels[match.status]}</span>
            </div>
            <h1 style={{ fontFamily: "'Cinzel',serif", fontSize: 24, color: '#F0E6D2', margin: '0 0 8px' }}>{dateStr}</h1>
            <div style={{ color: '#A8A8B3', fontSize: 14, display: 'flex', gap: 12 }}>
              <span>🕐 {timeStr}</span>
              <span>{modeEmoji[match.mode.slug]} {match.mode.name}</span>
              <span>📖 {match.deck.name}</span>
            </div>
          </div>
          {match.status === 'planned' && (
            <button onClick={() => navigate('finalize', { id: match.id })} style={{ background: '#C9A44C', color: '#0E0E12', border: 'none', borderRadius: 8, padding: '10px 20px', fontWeight: 700, cursor: 'pointer' }}>
              Завершить партию
            </button>
          )}
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'minmax(0,1fr) 280px', gap: 24, alignItems: 'start' }}>
        <div>
          {/* Result board */}
          {match.status === 'completed' && (
            <div style={{ background: '#17171F', borderRadius: 12, padding: '20px', border: '1px solid #2A2A36', marginBottom: 24 }}>
              <h3 style={{ fontFamily: "'Cinzel',serif", fontSize: 16, color: '#F0E6D2', margin: '0 0 16px' }}>Итоговый расклад</h3>
              {sortedParticipations.map((part, i) => (
                <PlacementRow key={part.id} participation={part} rank={part.place || i + 1} onClick={(id) => navigate('profile', { id })} />
              ))}
            </div>
          )}

          {/* Outcome summary */}
          {match.outcome && (
            <div style={{ background: '#17171F', borderRadius: 12, padding: '20px', border: '1px solid #2A2A36', marginBottom: 24 }}>
              <h3 style={{ fontFamily: "'Cinzel',serif", fontSize: 16, color: '#F0E6D2', margin: '0 0 16px' }}>Итоги</h3>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: 12 }}>

                  <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 28, fontWeight: 700, color: '#C9A44C' }}>{match.outcome.roundsPlayed}</div>
                </div>
                <div style={{ background: '#1F1F2A', borderRadius: 8, padding: '12px 16px' }}>
                  <div style={{ color: '#6B6B75', fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 4 }}>Конец</div>
                  <div style={{ color: '#F0E6D2', fontSize: 14, fontWeight: 600 }}>{endReasonLabels[match.outcome.endReason] || match.outcome.endReason}</div>
                </div>
                {match.outcome.mvp && (
                  <div style={{ background: '#1F1F2A', borderRadius: 8, padding: '12px 16px' }}>
                    <div style={{ color: '#6B6B75', fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 4 }}>MVP</div>

            </div>
          )}

          {/* Votes */}
          {match.status === 'completed' && (
            <div style={{ background: '#17171F', borderRadius: 12, padding: '20px', border: '1px solid #2A2A36', marginBottom: 24 }}>
              <h3 style={{ fontFamily: "'Cinzel',serif", fontSize: 16, color: '#F0E6D2', margin: '0 0 4px' }}>👑 Голосование</h3>
              <div style={{ color: '#6B6B75', fontSize: 12, marginBottom: 16 }}>Поставь корону лучшему и говно худшему</div>

                {match.participations.filter(p => p.user.id !== currentUser.id).map(part => {

                  const isEffect = voteEffect?.userId === part.user.id;

                    <div key={part.id} style={{

                      <div style={{ flex: 1 }}>
                        <div style={{ color: '#F0E6D2', fontWeight: 600, fontSize: 14 }}>{part.user.nickname}</div>

                      </div>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 6, color: '#6B6B75', fontSize: 12 }}>
                        <span>👑 {vs.crowns}</span>

                      <div style={{ display: 'flex', gap: 6 }}>

                          background: vs.myVote === 'negative' ? '#8B451322' : 'transparent',
                          border: `1.5px solid ${vs.myVote === 'negative' ? '#B73E3E' : '#3A3A46'}`,
                          borderRadius: 8, padding: '6px 12px', cursor: 'pointer', fontSize: 18,
                          transform: isEffect && voteEffect.type === 'negative' ? 'scale(1.3)' : 'scale(1)',
                          transition: 'transform 0.2s',
                        }}>💩</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

          {/* Comments */}

            </form>
          </div>
        </div>

        {/* Sidebar widgets (desktop) */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div style={{ background: '#17171F', borderRadius: 12, padding: '20px', border: '1px solid #2A2A36' }}>

            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {sortedParticipations.map(part => {
                const f = FACTIONS[part.faction];
                return (
                  <button key={part.id} onClick={() => navigate('profile', { id: part.user.id })} style={{
                    display: 'flex', alignItems: 'center', gap: 8, background: 'none',
                    border: 'none', cursor: 'pointer', padding: '4px 0', textAlign: 'left',
                  }}>
                    <AvatarCircle user={part.user} faction={part.faction} size={28} />
                    <div>
                      <div style={{ color: '#F0E6D2', fontSize: 13, fontWeight: 500 }}>{part.user.nickname}</div>
                      <div style={{ color: f.color, fontSize: 11 }}>{f.name}</div>
                    </div>
                    {part.place && <span style={{ marginLeft: 'auto', fontFamily: "'JetBrains Mono',monospace", color: part.place === 1 ? '#C9A44C' : '#6B6B75', fontSize: 12 }}>#{part.place}</span>}
                  </button>
                );
              })}
            </div>
          </div>
          {match.planningNote && (
            <div style={{ background: '#17171F', borderRadius: 12, padding: '20px', border: '1px solid #2A2A36' }}>
              <h4 style={{ fontFamily: "'Cinzel',serif", fontSize: 14, color: '#F0E6D2', margin: '0 0 8px' }}>Заметка</h4>
              <p style={{ color: '#A8A8B3', fontSize: 13, margin: 0, fontStyle: 'italic' }}>"{match.planningNote}"</p>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { HomeScreen, MatchesScreen, MatchDetailScreen });
})();

</script>

// Mini line chart using SVG
function MiniLineChart({ data, color = '#C9A44C', height = 80 }) {
  if (!data || data.length < 2) return null;
  const w = 300, h = height;
  const pad = 8;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = pad + (i / (data.length - 1)) * (w - pad * 2);
    const y = h - pad - ((v - min) / range) * (h - pad * 2);
    return `${x},${y}`;
  });
  const path = 'M' + pts.join(' L');
  const area = path + ` L${w - pad},${h - pad} L${pad},${h - pad} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: '100%', height }} preserveAspectRatio="none">
      <defs>
        <linearGradient id="lgrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill="url(#lgrad)"/>
      <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map((pt, i) => {
        const [x, y] = pt.split(',').map(Number);
        return <circle key={i} cx={x} cy={y} r="3" fill={color}/>;
      })}
    </svg>
  );
}

// ── LEADERBOARD ───────────────────────────────────────────────────────────────
function LeaderboardScreen({ navigate }) {
  const [metric, setMetric] = useState('winrate');
  const metrics = [
    { id: 'winrate', label: 'Винрейт' },
    { id: 'wins', label: 'Победы' },
    { id: 'games', label: 'Партии' },
    { id: 'crowns', label: 'Короны' },
    { id: 'shits', label: 'Говно' },
    { id: 'avgplace', label: 'Ср. место' },
  ];
  const [prev, setPrev] = useState(null);
  const [data, setData] = useState(() => computeLeaderboard('winrate'));

  function switchMetric(m) {
    setPrev(metric);
    setMetric(m);
    setData(computeLeaderboard(m));
  }

  const metricLabel = metrics.find(m => m.id === metric)?.label;

  const pillStyle = (active) => ({
    background: active ? '#C9A44C' : '#17171F',
    color: active ? '#0E0E12' : '#A8A8B3',
    border: `1px solid ${active ? '#C9A44C' : '#2A2A36'}`,
    borderRadius: 100, padding: '6px 16px', cursor: 'pointer', fontSize: 13,
    fontWeight: active ? 700 : 400, transition: 'all 0.15s',
  });

  return (
    <div style={{ maxWidth: 800, margin: '0 auto' }}>
      <h1 style={{ fontFamily: "'Cinzel',serif", fontSize: 28, color: '#F0E6D2', marginBottom: 24 }}>🏆 Рейтинг</h1>

      <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 32 }}>
        {metrics.map(m => (
          <button key={m.id} style={pillStyle(metric === m.id)} onClick={() => switchMetric(m.id)}>{m.label}</button>
        ))}
      </div>

      <div style={{ background: '#17171F', borderRadius: 16, border: '1px solid #2A2A36', overflow: 'hidden', padding: '8px' }}>
        {data.map((entry, i) => (
          <div key={entry.user.id} style={{ animation: 'fadeIn 0.3s ease-out', animationDelay: `${i * 30}ms`, animationFillMode: 'both' }}>
            <LeaderboardRow
              rank={i + 1}
              user={entry.user}
              metricValue={entry.value}
              metricLabel={metricLabel}
              faction={entry.user.favoriteFaction}
              onClick={(id) => navigate('profile', { id })}
            />
          </div>
        ))}
      </div>
    </div>
  );
}

// ── HEAD-TO-HEAD ─────────────────────────────────────────────────────────────
function H2HScreen({ playerAId, playerBId, navigate }) {
  const [selA, setSelA] = useState(playerAId || PLAYERS[0].id);
  const [selB, setSelB] = useState(playerBId || PLAYERS[1].id);

  const h2h = computeH2H(selA, selB);
  const playerA = h2h.userA;
  const playerB = h2h.userB;
  const ffA = playerA.favoriteFaction ? FACTIONS[playerA.favoriteFaction] : null;
  const ffB = playerB.favoriteFaction ? FACTIONS[playerB.favoriteFaction] : null;

  const selStyle = { background: '#17171F', border: '1px solid #2A2A36', borderRadius: 8, color: '#F0E6D2', padding: '8px 12px', fontSize: 14, cursor: 'pointer', width: '100%' };

  const total = h2h.winsA + h2h.winsB || 1;
  const pctA = Math.round((h2h.winsA / total) * 100);
  const pctB = Math.round((h2h.winsB / total) * 100);

  return (
    <div style={{ maxWidth: 900, margin: '0 auto' }}>
      <h1 style={{ fontFamily: "'Cinzel',serif", fontSize: 28, color: '#F0E6D2', marginBottom: 24 }}>⚡ Head-to-Head</h1>

      {/* Selectors */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr auto 1fr', gap: 16, alignItems: 'center', marginBottom: 32 }}>
        <select style={selStyle} value={selA} onChange={e => setSelA(Number(e.target.value))}>
          {PLAYERS.map(p => <option key={p.id} value={p.id}>{p.nickname}</option>)}
        </select>
        <div style={{ fontFamily: "'Cinzel',serif", color: '#C9A44C', fontWeight: 700, fontSize: 20, textAlign: 'center' }}>VS</div>
        <select style={selStyle} value={selB} onChange={e => setSelB(Number(e.target.value))}>
          {PLAYERS.map(p => <option key={p.id} value={p.id}>{p.nickname}</option>)}
        </select>
      </div>

      {/* Hero comparison */}
      <div style={{ background: 'linear-gradient(135deg, #17171F, #1F1F2A)', borderRadius: 16, padding: '32px', marginBottom: 24, border: '1px solid #2A2A36' }}>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr auto 1fr', gap: 24, alignItems: 'center' }}>
          {/* Player A */}
          <div style={{ textAlign: 'center' }}>
            <AvatarCircle user={playerA} faction={playerA.favoriteFaction} size={72} />
            <div style={{ fontFamily: "'Cinzel',serif", fontSize: 20, color: '#F0E6D2', marginTop: 12, fontWeight: 700 }}>{playerA.nickname}</div>
            {ffA && <div style={{ color: ffA.color, fontSize: 13, marginTop: 4 }}>{ffA.name}</div>}
            <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 48, fontWeight: 700, color: h2h.winsA >= h2h.winsB ? '#C9A44C' : '#A8A8B3', marginTop: 16 }}>{h2h.winsA}</div>
            <div style={{ color: '#6B6B75', fontSize: 12, textTransform: 'uppercase', letterSpacing: '0.08em' }}>победы</div>
          </div>

          {/* Center */}
          <div style={{ textAlign: 'center' }}>
            <div style={{ fontFamily: "'Cinzel',serif", color: '#C9A44C', fontSize: 32, fontWeight: 700 }}>VS</div>
            <div style={{ color: '#6B6B75', fontSize: 12, marginTop: 8 }}>{h2h.gamesTogetherCount} партий вместе</div>
            {/* Win bar */}
            <div style={{ marginTop: 16, display: 'flex', height: 8, borderRadius: 4, overflow: 'hidden', width: 160 }}>
              <div style={{ width: `${pctA}%`, background: ffA?.color || '#C9A44C', transition: 'width 0.6s' }}/>
              <div style={{ width: `${pctB}%`, background: ffB?.color || '#A8A8B3', transition: 'width 0.6s' }}/>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', color: '#6B6B75', fontSize: 10, marginTop: 4, width: 160 }}>
              <span>{pctA}%</span><span>{pctB}%</span>
            </div>
          </div>

          {/* Player B */}
          <div style={{ textAlign: 'center' }}>
            <AvatarCircle user={playerB} faction={playerB.favoriteFaction} size={72} />
            <div style={{ fontFamily: "'Cinzel',serif", fontSize: 20, color: '#F0E6D2', marginTop: 12, fontWeight: 700 }}>{playerB.nickname}</div>
            {ffB && <div style={{ color: ffB.color, fontSize: 13, marginTop: 4 }}>{ffB.name}</div>}
            <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 48, fontWeight: 700, color: h2h.winsB > h2h.winsA ? '#C9A44C' : '#A8A8B3', marginTop: 16 }}>{h2h.winsB}</div>
            <div style={{ color: '#6B6B75', fontSize: 12, textTransform: 'uppercase', letterSpacing: '0.08em' }}>победы</div>
          </div>
        </div>
      </div>

      {/* Stats */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: 16, marginBottom: 24 }}>
        {[
          { label: 'Партий вместе', a: h2h.gamesTogetherCount, b: '', single: true },
          { label: 'Среднее место', a: h2h.avgPlaceA, b: h2h.avgPlaceB },
        ].map((s, i) => (
          <div key={i} style={{ background: '#17171F', borderRadius: 12, padding: '16px 20px', border: '1px solid #2A2A36' }}>
            <div style={{ color: '#6B6B75', fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 8 }}>{s.label}</div>
            {s.single ? (
              <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 32, fontWeight: 700, color: '#C9A44C' }}>{s.a}</div>
            ) : (
              <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 24, fontWeight: 700, color: ffA?.color || '#C9A44C' }}>{s.a}</div>
                <div style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 24, fontWeight: 700, color: ffB?.color || '#A8A8B3' }}>{s.b}</div>
              </div>
            )}
          </div>
        ))}
      </div>

      {/* Shared matches */}
      {h2h.matches.length > 0 && (
        <div>
          <h3 style={{ fontFamily: "'Cinzel',serif", fontSize: 16, color: '#F0E6D2', marginBottom: 16 }}>Общие партии</h3>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 12 }}>
            {h2h.matches.map(m => (
              <MatchCard key={m.id} match={m} onClick={(id) => navigate('match', { id })} compact />
            ))}
          </div>
        </div>
      )}
      {h2h.gamesTogetherCount === 0 && (
        <EmptyState icon="⚡" title="Общих партий нет" description="Эти игроки ещё не встречались в одной партии" />
      )}
    </div>
  );
}

Object.assign(window, { PlayersScreen, PlayerProfileScreen, LeaderboardScreen, H2HScreen });
})();

</script>

// ── CREATE SESSION ────────────────────────────────────────────────────────────
function CreateSessionScreen({ navigate }) {
  const [mode, setMode] = useState('plan');
  const [gameMode, setGameMode] = useState('classic');
  const [deck, setDeck] = useState('original');
  const [date, setDate] = useState('2026-04-30');
  const [time, setTime] = useState('19:00');
  const [note, setNote] = useState('');
  const [invited, setInvited] = useState([]);
  const [search, setSearch] = useState('');
  const [factionAssign, setFactionAssign] = useState({});

  const usedFactions = Object.values(factionAssign);
  const available = PLAYERS.filter(p => !invited.some(i => i.id === p.id));
  const filtered = search ? available.filter(p => p.nickname.toLowerCase().includes(search.toLowerCase())) : available;

  const modeCards = [
    { slug: 'classic', name: 'Классика', icon: '⚔️', desc: '3–6 игроков' },
    { slug: 'quests', name: 'Квесты', icon: '📜', desc: '3–6 игроков' },
    { slug: 'alternative', name: 'Альтернатива', icon: '🔀', desc: '3–6 игроков' },
    { slug: 'dragons', name: 'Драконы', icon: '🐉', desc: '3–6 игроков' },
  ];

  const inputStyle = { width: '100%', background: '#17171F', border: '1px solid #2A2A36', borderRadius: 8, padding: '10px 14px', color: '#F0E6D2', fontSize: 14, outline: 'none', boxSizing: 'border-box' };
  const pillStyle = (active) => ({ background: active ? '#C9A44C' : '#17171F', color: active ? '#0E0E12' : '#A8A8B3', border: `1px solid ${active ? '#C9A44C' : '#2A2A36'}`, borderRadius: 100, padding: '6px 20px', cursor: 'pointer', fontSize: 14, fontWeight: active ? 700 : 400, transition: 'all 0.15s' });

  function addPlayer(player) {
    setInvited([...invited, player]);
  }
  function removePlayer(id) {
    setInvited(invited.filter(p => p.id !== id));
    const fa = { ...factionAssign };
    delete fa[id];
    setFactionAssign(fa);
  }

  return (
    <div style={{ maxWidth: 700, margin: '0 auto' }}>
      <h1 style={{ fontFamily: "'Cinzel',serif", fontSize: 28, color: '#F0E6D2', marginBottom: 8 }}>Новая партия</h1>

      {/* Mode switcher */}
      <div style={{ display: 'flex', gap: 8, marginBottom: 32 }}>
        <button style={pillStyle(mode === 'plan')} onClick={() => setMode('plan')}>📅 Запланировать</button>
        <button style={pillStyle(mode === 'record')} onClick={() => setMode('record')}>⚔️ Записать сыгранную</button>
      </div>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>
        {/* Date/time */}
        <div style={{ background: '#17171F', borderRadius: 12, padding: '20px', border: '1px solid #2A2A36' }}>
          <h3 style={{ fontFamily: "'Cinzel',serif", fontSize: 15, color: '#F0E6D2', margin: '0 0 16px' }}>📅 Дата и время</h3>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
            <div>
              <label style={{ color: '#6B6B75', fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', display: 'block', marginBottom: 6 }}>Дата</label>
              <input style={inputStyle} type="date" value={date} onChange={e => setDate(e.target.value)} />
            </div>
            <div>
              <label style={{ color: '#6B6B75', fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', display: 'block', marginBottom: 6 }}>Время</label>
              <input style={inputStyle} type="time" value={time} onChange={e => setTime(e.target.value)} />
            </div>
          </div>
        </div>

        {/* Game mode */}
        <div style={{ background: '#17171F', borderRadius: 12, padding: '20px', border: '1px solid #2A2A36' }}>
          <h3 style={{ fontFamily: "'Cinzel',serif", fontSize: 15, color: '#F0E6D2', margin: '0 0 16px' }}>🎮 Режим игры</h3>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 10 }}>
            {modeCards.map(m => (
              <button key={m.slug} onClick={() => setGameMode(m.slug)} style={{
                background: gameMode === m.slug ? '#C9A44C14' : '#1F1F2A',
                border: `1.5px solid ${gameMode === m.slug ? '#C9A44C' : '#2A2A36'}`,
                borderRadius: 10, padding: '14px', cursor: 'pointer', textAlign: 'left',
                transform: gameMode === m.slug ? 'scale(1.02)' : 'scale(1)', transition: 'all 0.15s',
              }}>
                <div style={{ fontSize: 24, marginBottom: 4 }}>{m.icon}</div>
                <div style={{ color: gameMode === m.slug ? '#C9A44C' : '#F0E6D2', fontWeight: 600, fontSize: 14 }}>{m.name}</div>
                <div style={{ color: '#6B6B75', fontSize: 12, marginTop: 2 }}>{m.desc}</div>
              </button>
            ))}
          </div>
        </div>

        {/* Deck */}
        <div style={{ background: '#17171F', borderRadius: 12, padding: '20px', border: '1px solid #2A2A36' }}>
          <h3 style={{ fontFamily: "'Cinzel',serif", fontSize: 15, color: '#F0E6D2', margin: '0 0 16px' }}>📖 Колода</h3>
          <div style={{ display: 'flex', gap: 8 }}>
            {Object.values(DECKS).map(d => (
              <button key={d.slug} style={pillStyle(deck === d.slug)} onClick={() => setDeck(d.slug)}>{d.name}</button>
            ))}
          </div>
        </div>

        {/* Players */}
        <div style={{ background: '#17171F', borderRadius: 12, padding: '20px', border: '1px solid #2A2A36' }}>
          <h3 style={{ fontFamily: "'Cinzel',serif", fontSize: 15, color: '#F0E6D2', margin: '0 0 16px' }}>👥 Игроки ({invited.length})</h3>
          <input style={{ ...inputStyle, marginBottom: 12 }} placeholder="Поиск по нику..." value={search} onChange={e => setSearch(e.target.value)} />
          {search && filtered.length > 0 && (
            <div style={{ background: '#1F1F2A', borderRadius: 8, marginBottom: 12, overflow: 'hidden' }}>
              {filtered.map(p => (
                <button key={p.id} onClick={() => { addPlayer(p); setSearch(''); }} style={{ display: 'flex', alignItems: 'center', gap: 10, width: '100%', background: 'none', border: 'none', padding: '10px 14px', cursor: 'pointer', color: '#F0E6D2', borderBottom: '1px solid #2A2A36' }}
                  onMouseEnter={e => e.currentTarget.style.background = '#2A2A36'}
                  onMouseLeave={e => e.currentTarget.style.background = 'none'}
                >
                  <window.AvatarCircle user={p} size={28} />
                  <span>{p.nickname}</span>
                  <span style={{ marginLeft: 'auto', color: '#C9A44C', fontSize: 18 }}>+</span>
                </button>
              ))}
            </div>
          )}
          {invited.length > 0 && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {invited.map(p => (
                <div key={p.id} style={{ display: 'flex', alignItems: 'center', gap: 10, background: '#1F1F2A', borderRadius: 8, padding: '10px 14px' }}>
                  <window.AvatarCircle user={p} faction={factionAssign[p.id]} size={32} />
                  <span style={{ color: '#F0E6D2', flex: 1 }}>{p.nickname}</span>
                  <select
                    value={factionAssign[p.id] || ''}
                    onChange={e => setFactionAssign({ ...factionAssign, [p.id]: e.target.value })}
                    style={{ background: '#17171F', border: '1px solid #2A2A36', borderRadius: 6, color: '#A8A8B3', padding: '4px 8px', fontSize: 12, cursor: 'pointer' }}
                  >
                    <option value="">— Фракция —</option>
                    {Object.values(FACTIONS).map(f => (
                      <option key={f.slug} value={f.slug} disabled={usedFactions.includes(f.slug) && factionAssign[p.id] !== f.slug}>{f.name}</option>
                    ))}
                  </select>
                  <button onClick={() => removePlayer(p.id)} style={{ background: 'none', border: 'none', color: '#6B6B75', cursor: 'pointer', fontSize: 18 }}>×</button>
                </div>
              ))}
            </div>
          )}
          {invited.length === 0 && <div style={{ color: '#6B6B75', fontSize: 13 }}>Найдите и добавьте игроков выше</div>}
        </div>

        {/* Note */}
        <div style={{ background: '#17171F', borderRadius: 12, padding: '20px', border: '1px solid #2A2A36' }}>
          <h3 style={{ fontFamily: "'Cinzel',serif", fontSize: 15, color: '#F0E6D2', margin: '0 0 12px' }}>📝 Заметка (опционально)</h3>
          <textarea value={note} onChange={e => setNote(e.target.value)} placeholder="Что-нибудь о партии..." style={{ ...inputStyle, minHeight: 80, resize: 'vertical', fontFamily: 'Inter, sans-serif' }} />
        </div>

        <div style={{ display: 'flex', gap: 12 }}>
          <button onClick={() => navigate('home')} style={{ flex: 1, background: 'transparent', border: '1px solid #3A3A46', borderRadius: 10, padding: '14px', color: '#A8A8B3', cursor: 'pointer', fontSize: 15 }}>Отмена</button>
          <button onClick={() => navigate('home')} style={{ flex: 2, background: '#C9A44C', color: '#0E0E12', border: 'none', borderRadius: 10, padding: '14px', fontWeight: 700, fontSize: 15, cursor: 'pointer' }}>
            {mode === 'plan' ? '📅 Запланировать' : '⚔️ Записать партию'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── FINALIZE SESSION ─────────────────────────────────────────────────────────
function FinalizeScreen({ matchId, navigate }) {
  const match = SESSIONS.find(s => s.id === matchId) || SESSIONS[0];
  const [step, setStep] = useState(0);
  const [order, setOrder] = useState([...match.participations]);
  const [castles, setCastles] = useState(Object.fromEntries(match.participations.map(p => [p.id, p.castles || 4])));
  const [rounds, setRounds] = useState(9);
  const [endReason, setEndReason] = useState('castles_7');
  const [mvp, setMvp] = useState(null);
  const [finalNote, setFinalNote] = useState('');
  const [done, setDone] = useState(false);
  const [confetti, setConfetti] = useState(false);

  const steps = ['Места', 'Замки', 'Детали', 'Подтверждение'];
  const endReasons = [
    { slug: 'castles_7', label: '7 замков' },
    { slug: 'timer', label: 'Таймер' },
    { slug: 'rounds_end', label: 'Конец раундов' },
    { slug: 'early', label: 'Досрочно' },
    { slug: 'other', label: 'Другое' },
  ];

  function moveUp(i) { if (i === 0) return; const arr = [...order]; [arr[i-1], arr[i]] = [arr[i], arr[i-1]]; setOrder(arr); }
  function moveDown(i) { if (i === order.length-1) return; const arr = [...order]; [arr[i], arr[i+1]] = [arr[i+1], arr[i]]; setOrder(arr); }

  function finalize() {
    setConfetti(true);
    setTimeout(() => { setConfetti(false); setDone(true); }, 3000);
  }

  if (done) { navigate('match', { id: match.id }); return null; }

  const winner = order[0];
  const winnerFaction = winner ? FACTIONS[winner.faction] : null;

  return (
    <div style={{ maxWidth: 680, margin: '0 auto' }}>
      {/* Confetti overlay */}
      {confetti && (
        <div style={{ position: 'fixed', inset: 0, zIndex: 9999, pointerEvents: 'none', overflow: 'hidden' }}>
          {Array.from({ length: 60 }).map((_, i) => (
            <div key={i} style={{
              position: 'absolute',
              left: `${Math.random() * 100}%`,
              top: -20,
              width: 8, height: 8,
              background: [winnerFaction?.color || '#C9A44C', '#F0E6D2', '#C9A44C', '#4F7D4F'][i % 4],
              borderRadius: Math.random() > 0.5 ? '50%' : 0,
              animation: `confettiFall ${1.5 + Math.random() * 2}s ease-in forwards`,
              animationDelay: `${Math.random() * 1}s`,
            }}/>
          ))}
        </div>
      )}

      <button onClick={() => navigate('match', { id: match.id })} style={{ background: 'none', border: 'none', color: '#C9A44C', cursor: 'pointer', fontSize: 13, marginBottom: 16, padding: 0 }}>← Партия #{match.id}</button>
      <h1 style={{ fontFamily: "'Cinzel',serif", fontSize: 28, color: '#F0E6D2', marginBottom: 24 }}>Завершить партию</h1>

      {/* Progress */}
      <div style={{ display: 'flex', gap: 8, marginBottom: 32 }}>
        {steps.map((s, i) => (
          <div key={i} style={{ flex: 1 }}>
            <div style={{ height: 4, borderRadius: 2, background: i <= step ? '#C9A44C' : '#2A2A36', transition: 'background 0.3s', marginBottom: 6 }}/>
            <div style={{ color: i === step ? '#C9A44C' : i < step ? '#6B6B75' : '#3A3A46', fontSize: 11, textAlign: 'center', fontWeight: i === step ? 600 : 400 }}>{s}</div>
          </div>
        ))}
      </div>

      {/* Step 0 — Places */}
      {step === 0 && (
        <div style={{ background: '#17171F', borderRadius: 12, padding: '24px', border: '1px solid #2A2A36' }}>
          <h3 style={{ fontFamily: "'Cinzel',serif", color: '#F0E6D2', margin: '0 0 8px' }}>Расставьте игроков по местам</h3>
          <p style={{ color: '#6B6B75', fontSize: 13, marginBottom: 20 }}>Первый в списке — победитель. Используйте кнопки ↑↓ для сортировки.</p>
          {order.map((part, i) => {
            const f = FACTIONS[part.faction];
            return (
              <div key={part.id} style={{
                display: 'flex', alignItems: 'center', gap: 12, padding: '12px 16px',
                background: i === 0 ? '#C9A44C0A' : '#1F1F2A', borderRadius: 10, marginBottom: 8,
                borderLeft: `3px solid ${f.color}`,
              }}>
                <span style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 20, fontWeight: 700, color: i === 0 ? '#C9A44C' : '#6B6B75', width: 32 }}>{i === 0 ? '👑' : i + 1}</span>
                <window.AvatarCircle user={part.user} faction={part.faction} size={36} />
                <div style={{ flex: 1 }}>
                  <div style={{ color: '#F0E6D2', fontWeight: 600 }}>{part.user.nickname}</div>
                  <div style={{ color: f.color, fontSize: 12 }}>{f.name}</div>
                </div>
                <div style={{ display: 'flex', gap: 4 }}>
                  <button onClick={() => moveUp(i)} style={{ background: '#2A2A36', border: 'none', borderRadius: 6, width: 28, height: 28, cursor: 'pointer', color: '#A8A8B3' }}>↑</button>
                  <button onClick={() => moveDown(i)} style={{ background: '#2A2A36', border: 'none', borderRadius: 6, width: 28, height: 28, cursor: 'pointer', color: '#A8A8B3' }}>↓</button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Step 1 — Castles */}
      {step === 1 && (
        <div style={{ background: '#17171F', borderRadius: 12, padding: '24px', border: '1px solid #2A2A36' }}>
          <h3 style={{ fontFamily: "'Cinzel',serif", color: '#F0E6D2', margin: '0 0 20px' }}>Количество замков</h3>
          {order.map((part, i) => {
            const f = FACTIONS[part.faction];
            return (
              <div key={part.id} style={{ display: 'flex', alignItems: 'center', gap: 16, padding: '12px 0', borderBottom: '1px solid #1A1A22' }}>
                <span style={{ fontFamily: "'JetBrains Mono',monospace", color: '#6B6B75', width: 20, textAlign: 'center' }}>{i + 1}</span>
                <window.AvatarCircle user={part.user} faction={part.faction} size={32} />
                <span style={{ color: '#F0E6D2', fontWeight: 600, flex: 1 }}>{part.user.nickname}</span>
                <NumberStepper
                  value={castles[part.id] || 0}
                  onChange={v => setCastles({ ...castles, [part.id]: v })}
                  min={0} max={15}
                />
              </div>
            );
          })}
        </div>
      )}

      {/* Step 2 — Details */}
      {step === 2 && (
        <div style={{ background: '#17171F', borderRadius: 12, padding: '24px', border: '1px solid #2A2A36', display: 'flex', flexDirection: 'column', gap: 20 }}>
          <div>
            <label style={{ color: '#6B6B75', fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', display: 'block', marginBottom: 8 }}>Раундов сыграно</label>
            <NumberStepper value={rounds} onChange={setRounds} min={1} max={20} icon="🔄" />
          </div>
          <div>
            <label style={{ color: '#6B6B75', fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', display: 'block', marginBottom: 12 }}>Причина окончания</label>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(130px, 1fr))', gap: 8 }}>
              {endReasons.map(r => (
                <button key={r.slug} onClick={() => setEndReason(r.slug)} style={{
                  background: endReason === r.slug ? '#C9A44C14' : '#1F1F2A',
                  border: `1.5px solid ${endReason === r.slug ? '#C9A44C' : '#2A2A36'}`,
                  borderRadius: 8, padding: '10px', cursor: 'pointer',
                  color: endReason === r.slug ? '#C9A44C' : '#A8A8B3', fontSize: 13, fontWeight: endReason === r.slug ? 600 : 400,
                }}>{r.label}</button>
              ))}
            </div>
          </div>
          <div>
            <label style={{ color: '#6B6B75', fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', display: 'block', marginBottom: 8 }}>MVP (опционально)</label>
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              {order.map(p => (
                <button key={p.id} onClick={() => setMvp(mvp?.id === p.id ? null : p)} style={{
                  background: mvp?.id === p.id ? '#C9A44C14' : '#1F1F2A',
                  border: `1px solid ${mvp?.id === p.id ? '#C9A44C' : '#2A2A36'}`,
                  borderRadius: 100, padding: '6px 12px', cursor: 'pointer',
                  display: 'flex', alignItems: 'center', gap: 6,
                }}>
                  <window.AvatarCircle user={p.user} size={22} />
                  <span style={{ color: '#F0E6D2', fontSize: 13 }}>{p.user.nickname}</span>
                </button>
              ))}
            </div>
          </div>
          <div>
            <label style={{ color: '#6B6B75', fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em', display: 'block', marginBottom: 8 }}>Финальная заметка</label>
            <textarea value={finalNote} onChange={e => setFinalNote(e.target.value)} placeholder="Что запомнится..." style={{ width: '100%', background: '#1F1F2A', border: '1px solid #2A2A36', borderRadius: 8, padding: '10px 14px', color: '#F0E6D2', fontSize: 14, outline: 'none', minHeight: 70, resize: 'vertical', boxSizing: 'border-box', fontFamily: 'Inter' }} />
          </div>
        </div>
      )}

      {/* Step 3 — Confirm */}
      {step === 3 && (
        <div style={{ background: '#17171F', borderRadius: 12, padding: '24px', border: '1px solid #2A2A36' }}>
          <h3 style={{ fontFamily: "'Cinzel',serif", color: '#F0E6D2', margin: '0 0 20px' }}>Проверьте итоги</h3>
          {order.map((part, i) => {
            const f = FACTIONS[part.faction];
            return (
              <div key={part.id} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 16px', background: i === 0 ? '#C9A44C0A' : '#1F1F2A', borderRadius: 10, borderLeft: `3px solid ${f.color}`, marginBottom: 8 }}>
                <span style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 20, color: i === 0 ? '#C9A44C' : '#6B6B75', width: 28 }}>{i === 0 ? '👑' : i + 1}</span>
                <window.AvatarCircle user={part.user} faction={part.faction} size={36} />
                <div style={{ flex: 1 }}>
                  <div style={{ color: '#F0E6D2', fontWeight: 600 }}>{part.user.nickname}</div>
                  <div style={{ color: f.color, fontSize: 12 }}>{f.name}</div>
                </div>
                <span style={{ display: 'flex', alignItems: 'center', gap: 4, color: '#A8A8B3' }}>
                  <span>🏰</span>
                  <span style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: 18, fontWeight: 700, color: '#F0E6D2' }}>{castles[part.id]}</span>
                </span>
              </div>
            );
          })}
          <div style={{ marginTop: 16, padding: '12px 16px', background: '#1F1F2A', borderRadius: 10, display: 'flex', gap: 16, flexWrap: 'wrap' }}>
            <span style={{ color: '#6B6B75', fontSize: 13 }}>🔄 {rounds} раундов</span>
            <span style={{ color: '#6B6B75', fontSize: 13 }}>🏁 {endReasons.find(r => r.slug === endReason)?.label}</span>
            {mvp && <span style={{ color: '#C9A44C', fontSize: 13 }}>⭐ MVP: {mvp.user.nickname}</span>}
          </div>
          {finalNote && <div style={{ marginTop: 12, color: '#A8A8B3', fontSize: 13, fontStyle: 'italic' }}>"{finalNote}"</div>}
        </div>
      )}

      {/* Navigation */}
      <div style={{ display: 'flex', gap: 12, marginTop: 24 }}>
        <button onClick={() => step > 0 ? setStep(step - 1) : navigate('matches')} style={{ flex: 1, background: 'transparent', border: '1px solid #3A3A46', borderRadius: 10, padding: '14px', color: '#A8A8B3', cursor: 'pointer', fontSize: 15 }}>
          {step === 0 ? 'Отмена' : '← Назад'}
        </button>
        {step < 3 ? (
          <button onClick={() => setStep(step + 1)} style={{ flex: 2, background: '#C9A44C', color: '#0E0E12', border: 'none', borderRadius: 10, padding: '14px', fontWeight: 700, fontSize: 15, cursor: 'pointer' }}>
            Далее →
          </button>
        ) : (
          <button onClick={finalize} style={{ flex: 2, background: '#C9A44C', color: '#0E0E12', border: 'none', borderRadius: 10, padding: '14px', fontWeight: 700, fontSize: 16, cursor: 'pointer', boxShadow: '0 8px 30px rgba(201,164,76,0.4)' }}>
            🏆 Финализировать
          </button>
        )}
      </div>
    </div>
  );
}

Object.assign(window, { FactionsScreen, FactionDetailScreen, LoginScreen, RegisterScreen, CreateSessionScreen, FinalizeScreen });
})();

</script>

<script type="text/babel">
(function() {
'use strict';
const { useState, useEffect } = React;

function App() {
  const [route, setRoute] = useState(() => {
    try { const s = localStorage.getItem('tronus_route'); if(s) return JSON.parse(s); } catch(e){}
    return { page: 'home', params: {} };
  });
  const [toast, setToast] = useState(null);

  function navigate(page, params = {}) {
    const r = { page, params };
    setRoute(r);
    try { localStorage.setItem('tronus_route', JSON.stringify(r)); } catch(e){}
    window.scrollTo(0, 0);
  }

  const { page, params } = route;

  function renderScreen() {
    switch (page) {
      case 'home':        return <window.HomeScreen navigate={navigate} />;
      case 'matches':     return <window.MatchesScreen navigate={navigate} />;
      case 'match':       return <window.MatchDetailScreen matchId={params.id || 1} navigate={navigate} />;
      case 'players':     return <window.PlayersScreen navigate={navigate} />;
      case 'profile':     return <window.PlayerProfileScreen playerId={params.id || 1} navigate={navigate} />;
      case 'leaderboard': return <window.LeaderboardScreen navigate={navigate} />;
      case 'factions':    return <window.FactionsScreen navigate={navigate} />;
      case 'faction':     return <window.FactionDetailScreen factionSlug={params.slug || 'stark'} navigate={navigate} />;
      case 'h2h':         return <window.H2HScreen playerAId={params.a || 1} playerBId={params.b || 2} navigate={navigate} />;
      case 'login':       return <window.LoginScreen navigate={navigate} />;
      case 'register':    return <window.RegisterScreen navigate={navigate} />;
      case 'create':      return <window.CreateSessionScreen navigate={navigate} />;
      case 'finalize':    return <window.FinalizeScreen matchId={params.id || 1} navigate={navigate} />;
      default:            return <window.HomeScreen navigate={navigate} />;
    }
  }

  if (page === 'login' || page === 'register') {
    return (
      <div style={{ minHeight: '100vh', background: '#0E0E12' }}>
        <div style={{ height: 64, background: '#0E0E12CC', backdropFilter: 'blur(12px)', borderBottom: '1px solid #1A1A22', display: 'flex', alignItems: 'center', padding: '0 24px' }}>
          <button onClick={() => navigate('home')} style={{ background: 'none', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 10 }}>
            <span style={{ fontSize: 24 }}>⚜️</span>
            <span style={{ fontFamily: "'Cinzel', serif", color: '#C9A44C', fontSize: 20, fontWeight: 700, letterSpacing: '0.1em' }}>TRONUS</span>
          </button>
        </div>
        {renderScreen()}
        {toast && <window.Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
      </div>
    );
  }

  return (
    <window.AppShell currentPage={page} navigate={navigate}>
      <div style={{ animation: 'fadeIn 0.3s ease-out' }} key={page}>
        {renderScreen()}
      </div>
      {toast && <window.Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
    </window.AppShell>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
})();
</script>
</body>
</html>
