services:
  db:
    image: postgres:15
    env_file:
      - ./env/backend.prod.env.example
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.prod
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60 --access-logfile -"
    env_file:
      - ./env/backend.prod.env.example
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - backend_static:/app/staticfiles
      - backend_media:/app/media

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile.prod
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_USE_MOCKS: "false"
        VITE_APP_NAME: Tronus
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - backend_static:/var/www/backend/static:ro
      - backend_media:/var/www/backend/media:ro

volumes:
  postgres_data:
  backend_static:
  backend_media:
