# Tronus — host nginx config
#
# Положи этот файл в /etc/nginx/sites-available/tronus.conf
# и сделай symlink: sudo ln -s /etc/nginx/sites-available/tronus.conf /etc/nginx/sites-enabled/
#
# Затем подкоррuctируй server_name, пути SSL и пути к статике.
#
# После изменений:
#   sudo nginx -t        # проверка конфига
#   sudo systemctl reload nginx

upstream tronus_backend {
    # gunicorn в контейнере docker-compose, слушает только loopback хоста.
    server 127.0.0.1:8000;
    keepalive 16;
}

# Редирект HTTP → HTTPS (раскомментируй когда настроишь SSL через certbot).
# server {
#     listen 80;
#     listen [::]:80;
#     server_name tronus.example.com;
#     return 301 https://$server_name$request_uri;
# }

server {
    # Если нужен HTTPS — поменяй на `listen 443 ssl http2;`
    # и раскомментируй ssl_certificate ниже.
    listen 80;
    listen [::]:80;
    server_name tronus.example.com;  # ← подставь свой домен

    # SSL (после certbot --nginx):
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/tronus.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/tronus.example.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Лимит на загрузку фото (для аватаров — 10 MB достаточно).
    client_max_body_size 10m;

    # Логи
    access_log /var/log/nginx/tronus.access.log;
    error_log /var/log/nginx/tronus.error.log warn;

    # ----- Backend API & Admin -----
    # Все API и админка идут на gunicorn через loopback.

    location /api/ {
        proxy_pass http://tronus_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    location /admin/ {
        proxy_pass http://tronus_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ----- Backend static & media -----
    # nginx читает напрямую с диска — быстрее и без нагрузки на gunicorn.
    # Эти директории — bind-mount из контейнера (см. docker-compose.prod.yml).

    location /static/ {
        alias /var/www/tronus/static/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/tronus/media/;
        access_log off;
        expires 30d;
    }

    # ----- Frontend SPA -----
    # Build от Vite (npm run build) положен сюда. Любой неизвестный путь
    # отдаётся как index.html — React Router сам решит что показать.

    root /var/www/tronus/dist;
    index index.html;

    # Статические assets кешировать долго (имена с хешами от Vite).
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — все остальные пути → index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
